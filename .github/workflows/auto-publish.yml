name: Auto Publish

on:
  pull_request_target:
    types: [closed]
    branches:
      - preview-fixes
      - preview-features

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: auto-publish
  cancel-in-progress: false
  queue: max

jobs:
  auto-publish-classify:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      base_ref: ${{ steps.classify.outputs.base_ref }}
      publishable: ${{ steps.classify.outputs.publishable }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify branch diff
        id: classify
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin preview-fixes preview-features preview master master-cdn

          case "${BASE_REF}" in
            preview-fixes)
              ranges=(
                "origin/preview-features...origin/preview-fixes"
                "origin/preview...origin/preview-features"
                "origin/master...origin/preview-fixes"
                "origin/master-cdn...origin/preview-fixes"
              )
              ;;
            preview-features)
              ranges=("origin/preview...origin/preview-features")
              ;;
            *)
              ranges=()
              ;;
          esac

          changes_file=$(mktemp)
          allowed_file=$(mktemp)
          disallowed_file=$(mktemp)
          registry_file=$(mktemp)

          for range in "${ranges[@]}"; do
            git diff --name-status "${range}" >> "${changes_file}"
          done

          sort -u "${changes_file}" | while IFS=$'\t' read -r status first second; do
            if [ -z "${status}" ]; then
              continue
            fi

            paths=("${first}")
            if [[ "${status}" == R* || "${status}" == C* ]]; then
              paths=("${first}" "${second}")
            fi

            is_allowed=true
            is_registry=false
            for path in "${paths[@]}"; do
              if [[ "${path}" == registry/lib/components/* || "${path}" == registry/lib/plugins/* ]]; then
                is_registry=true
                continue
              fi
              is_allowed=false
            done

            entry="${status} ${paths[*]}"
            if [ "${is_allowed}" = true ]; then
              echo "${entry}" >> "${allowed_file}"
            else
              echo "${entry}" >> "${disallowed_file}"
            fi
            if [ "${is_registry}" = true ]; then
              echo "${entry}" >> "${registry_file}"
            fi
          done

          registry_count=$(wc -l < "${registry_file}" | tr -d ' ')
          disallowed_count=$(wc -l < "${disallowed_file}" | tr -d ' ')
          publishable=false
          if [ "${registry_count}" -gt 0 ] && [ "${disallowed_count}" -eq 0 ]; then
            publishable=true
          fi

          if [ "${publishable}" = true ]; then
            reason_file="${registry_file}"
            reason_header="publishable branch diff"
          elif [ "${disallowed_count}" -gt 0 ]; then
            reason_file="${disallowed_file}"
            reason_header="blocked branch diff"
          else
            reason_file="${allowed_file}"
            reason_header="no registry source changes"
          fi

          reason_count=$(wc -l < "${reason_file}" | tr -d ' ')
          overflow=$((reason_count > 20 ? reason_count - 20 : 0))

          {
            echo "base_ref=${BASE_REF}"
            echo "publishable=${publishable}"
            echo "reason<<EOF"
            echo "${reason_header}: ${BASE_REF}"
            head -n 20 "${reason_file}"
            if [ "${overflow}" -gt 0 ]; then
              echo "and ${overflow} more"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          echo "auto-publish publishable=${publishable}"

  auto-publish-preview-fixes:
    needs: auto-publish-classify
    if: ${{ needs.auto-publish-classify.outputs.publishable == 'true' && needs.auto-publish-classify.outputs.base_ref == 'preview-fixes' }}
    runs-on: ubuntu-latest
    env:
      AUTO_PUBLISH_TOKEN: ${{ secrets.AUTO_PUBLISH_TOKEN }}
    steps:
      - name: Check publish token
        run: |
          if [ -z "${AUTO_PUBLISH_TOKEN}" ]; then
            echo "AUTO_PUBLISH_TOKEN is required for auto publish pushes."
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_PUBLISH_TOKEN }}
      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${AUTO_PUBLISH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Publish preview-fixes
        run: |
          git fetch origin preview-fixes preview-features preview master master-cdn

          git switch --detach origin/preview-features
          git merge --no-edit origin/preview-fixes
          git push origin HEAD:preview-features
          preview_features_head=$(git rev-parse HEAD)

          git switch --detach origin/preview
          git merge --no-edit "${preview_features_head}"
          git push origin HEAD:preview

          git switch --detach origin/master
          git merge --no-edit origin/preview-fixes
          git push origin HEAD:master

          git switch --detach origin/master-cdn
          git merge --no-edit origin/preview-fixes
          git push origin HEAD:master-cdn

  auto-publish-preview-features:
    needs: auto-publish-classify
    if: ${{ needs.auto-publish-classify.outputs.publishable == 'true' && needs.auto-publish-classify.outputs.base_ref == 'preview-features' }}
    runs-on: ubuntu-latest
    env:
      AUTO_PUBLISH_TOKEN: ${{ secrets.AUTO_PUBLISH_TOKEN }}
    steps:
      - name: Check publish token
        run: |
          if [ -z "${AUTO_PUBLISH_TOKEN}" ]; then
            echo "AUTO_PUBLISH_TOKEN is required for auto publish pushes."
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_PUBLISH_TOKEN }}
      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${AUTO_PUBLISH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Publish preview-features
        run: |
          git fetch origin preview-features preview

          git switch --detach origin/preview
          git merge --no-edit origin/preview-features
          git push origin HEAD:preview
